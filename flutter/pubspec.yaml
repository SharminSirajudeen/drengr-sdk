name: drengr_flutter_sdk
description: Zero-code in-process network capture for Flutter — one line records every HTTP request/response (http, Dio, dart:io) with secret/PII redaction, no networking changes.
version: 0.2.1
homepage: https://drengr.dev
repository: https://github.com/SharminSirajudeen/drengr-sdk
issue_tracker: https://github.com/SharminSirajudeen/drengr-sdk/issues
topics:
  - networking
  - http
  - observability
  - analytics
  - monitoring

environment:
  sdk: ">=3.0.0 <4.0.0"

dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0
  dio: ^5.7.0
